<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      // 主题防闪烁：在 body 渲染前读取 localStorage 并应用 class
      try {
        const stored = JSON.parse(localStorage.getItem('shijie-theme') || '{}');
        if (stored?.state?.mode === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
      } catch {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>提灯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
      /* 字体平滑 - 其他样式由 Tailwind 和 global.css 处理 */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"><style>#root-spinner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a2e}.dark #root-spinner{background:#1a1a2e}.light #root-spinner{background:#f8f8f6}#root-spinner svg{width:32px;height:32px;animation:rspin 1.2s linear infinite}@keyframes rspin{to{transform:rotate(360deg)}}#root-spinner circle{fill:none;stroke:#4CAF76;stroke-width:2.5;stroke-linecap:round;stroke-dasharray:60;stroke-dashoffset:20}</style><div id="root-spinner"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
