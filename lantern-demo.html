<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提灯 - SVG 动画预览</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    overflow: hidden;
  }
  .lantern-container {
    width: 360px;
    height: 460px;
    cursor: default;
    user-select: none;
  }

  /* ===== 火焰跳动动画 ===== */
  @keyframes flameFlicker1 {
    0%, 100% { transform: scaleX(1)    scaleY(1)    rotate(0deg); }
    15%      { transform: scaleX(0.94) scaleY(1.06) rotate(-2deg); }
    35%      { transform: scaleX(1.05) scaleY(0.95) rotate(1.5deg); }
    55%      { transform: scaleX(0.97) scaleY(1.04) rotate(-1deg); }
    75%      { transform: scaleX(1.03) scaleY(0.97) rotate(2deg); }
  }
  @keyframes flameFlicker2 {
    0%, 100% { transform: scaleX(1)    scaleY(1)    rotate(0deg); }
    20%      { transform: scaleX(1.04) scaleY(0.96) rotate(1.5deg); }
    40%      { transform: scaleX(0.96) scaleY(1.05) rotate(-2deg); }
    60%      { transform: scaleX(1.03) scaleY(0.97) rotate(1deg); }
    80%      { transform: scaleX(0.97) scaleY(1.03) rotate(-1.5deg); }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.25; }
    50%      { opacity: 0.5; }
  }
  @keyframes starTwinkle {
    0%, 100% { opacity: 0.8; transform: scale(1) rotate(0deg); }
    50%      { opacity: 1;   transform: scale(1.1) rotate(10deg); }
  }

  .flame-outer {
    transform-origin: 200px 142px;
    animation: flameFlicker1 1.8s ease-in-out infinite;
  }
  .flame-inner {
    transform-origin: 200px 145px;
    animation: flameFlicker2 1.3s ease-in-out infinite;
  }
  .flame-glow {
    transform-origin: 200px 145px;
    animation: glowPulse 2s ease-in-out infinite;
  }
  .flame-star {
    transform-origin: 200px 148px;
    animation: starTwinkle 2.5s ease-in-out infinite;
  }

  /* ===== 穗子轻摆 ===== */
  @keyframes tasselSway {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(1.5deg); }
    75%      { transform: rotate(-1.5deg); }
  }
  .tassel {
    transform-origin: 200px 285px;
    animation: tasselSway 3s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="lantern-container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <!-- 火焰光晕 -->
    <radialGradient id="flameGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF6B35" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#FF6B35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </radialGradient>
    <!-- 灯体高光 -->
    <radialGradient id="bodyShine" cx="38%" cy="35%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- 火焰径向渐变 -->
    <radialGradient id="flameGrad" cx="50%" cy="65%" r="55%">
      <stop offset="0%"  stop-color="#FFD93D"/>
      <stop offset="50%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </radialGradient>
  </defs>

  <!-- ==================== 火焰 ==================== -->
  <g id="flameGroup">
    <!-- 光晕 -->
    <ellipse class="flame-glow" cx="200" cy="145" rx="55" ry="60"
             fill="url(#flameGlow)" opacity="0.3"/>

    <!-- 外层火焰 -->
    <path class="flame-outer" d="
      M 200 80
      C 175 100, 160 125, 165 155
      C 168 172, 182 185, 200 188
      C 218 185, 232 172, 235 155
      C 240 125, 225 100, 200 80Z"
      fill="#FF8C42" opacity="0.9"/>

    <!-- 内层火焰 -->
    <path class="flame-inner" d="
      M 200 98
      C 183 114, 174 134, 177 156
      C 179 168, 188 177, 200 179
      C 212 177, 221 168, 223 156
      C 226 134, 217 114, 200 98Z"
      fill="#FFD93D" opacity="0.85"/>

    <!-- 火焰核心小星 -->
    <path class="flame-star" d="
      M 200 140 L 203 148 L 211 149 L 205 154 L 206 162 L 200 158 L 194 162 L 195 154 L 189 149 L 197 148Z"
      fill="#FFF3B0" opacity="0.9"/>
  </g>

  <!-- ==================== 灯体 ==================== -->
  <g id="bodyGroup">
    <!-- 主体 -->
    <circle cx="200" cy="290" r="95" fill="#F0B8B8"/>
    <!-- 高光 -->
    <circle cx="200" cy="290" r="95" fill="url(#bodyShine)"/>
    <!-- 轮廓 -->
    <circle cx="200" cy="290" r="95" fill="none" stroke="#D4918E" stroke-width="2"/>

    <!-- 装饰纹 - 外圈虚线圆 -->
    <circle cx="200" cy="290" r="75" fill="none" stroke="#E8A0A0" stroke-width="1.2"
            stroke-dasharray="6 8" opacity="0.5"/>
    <!-- 装饰纹 - 内圈小圆 -->
    <circle cx="200" cy="290" r="50" fill="none" stroke="#E8A0A0" stroke-width="1"
            stroke-dasharray="4 10" opacity="0.35"/>
    <!-- 装饰纹 - 中心点 -->
    <circle cx="200" cy="290" r="4" fill="#E8A0A0" opacity="0.4"/>

    <!-- 放射装饰线 -->
    <g stroke="#E8A0A0" stroke-width="0.8" opacity="0.3">
      <line x1="200" y1="240" x2="200" y2="218"/>
      <line x1="230" y1="252" x2="245" y2="235"/>
      <line x1="248" y1="275" x2="268" y2="268"/>
      <line x1="250" y1="295" x2="272" y2="295"/>
      <line x1="248" y1="315" x2="268" y2="322"/>
      <line x1="230" y1="332" x2="245" y2="348"/>
      <line x1="200" y1="340" x2="200" y2="362"/>
      <line x1="170" y1="332" x2="155" y2="348"/>
      <line x1="152" y1="315" x2="132" y2="322"/>
      <line x1="150" y1="295" x2="128" y2="295"/>
      <line x1="152" y1="275" x2="132" y2="268"/>
      <line x1="170" y1="252" x2="155" y2="235"/>
    </g>

    <!-- 中间金带 -->
    <rect x="103" y="283" width="194" height="14" rx="7" fill="#D4A853"/>
    <rect x="103" y="283" width="194" height="14" rx="7" fill="none"
          stroke="#B8922E" stroke-width="0.8"/>
    <!-- 金带圆点 -->
    <circle cx="140" cy="290" r="2.8" fill="#F0D68A"/>
    <circle cx="170" cy="290" r="2.8" fill="#F0D68A"/>
    <circle cx="200" cy="290" r="2.8" fill="#F0D68A"/>
    <circle cx="230" cy="290" r="2.8" fill="#F0D68A"/>
    <circle cx="260" cy="290" r="2.8" fill="#F0D68A"/>
  </g>

  <!-- ==================== 脸 ==================== -->
  <g id="faceGroup">
    <!-- 左眉（闭眼弧线） -->
    <path d="M 168 272 Q 178 260, 188 272"
          fill="none" stroke="#6B4E4E" stroke-width="2.5"
          stroke-linecap="round"/>
    <!-- 右眉（闭眼弧线） -->
    <path d="M 212 272 Q 222 260, 232 272"
          fill="none" stroke="#6B4E4E" stroke-width="2.5"
          stroke-linecap="round"/>

    <!-- 左瞳（鼠标跟随） -->
    <circle id="pupilL" cx="178" cy="278" r="3.5" fill="#5A3E3E"/>
    <!-- 右瞳（鼠标跟随） -->
    <circle id="pupilR" cx="222" cy="278" r="3.5" fill="#5A3E3E"/>

    <!-- 嘴巴 -->
    <path d="M 193 305 Q 200 312, 207 305"
          fill="none" stroke="#6B4E4E" stroke-width="2"
          stroke-linecap="round"/>
  </g>

  <!-- ==================== 穗子 ==================== -->
  <g class="tassel">
    <!-- 连接短绳 -->
    <line x1="200" y1="385" x2="200" y2="398"
          stroke="#D4A853" stroke-width="3" stroke-linecap="round"/>
    <!-- 金珠 -->
    <ellipse cx="200" cy="408" rx="10" ry="8" fill="#D4A853"/>
    <ellipse cx="200" cy="408" rx="10" ry="8" fill="none"
          stroke="#B8922E" stroke-width="0.8"/>
    <ellipse cx="197" cy="405" rx="3" ry="2" fill="#F0D68A" opacity="0.5"/>

    <!-- 左穗 -->
    <path d="M 192 416 Q 186 442, 184 465"
          fill="none" stroke="#E07070" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="184" cy="468" r="4.5" fill="#E07070"/>
    <circle cx="184" cy="468" r="4.5" fill="none" stroke="#C85050" stroke-width="0.8"/>

    <!-- 中穗 -->
    <line x1="200" y1="416" x2="200" y2="470"
          stroke="#E07070" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="200" cy="473" r="4.5" fill="#E07070"/>
    <circle cx="200" cy="473" r="4.5" fill="none" stroke="#C85050" stroke-width="0.8"/>

    <!-- 右穗 -->
    <path d="M 208 416 Q 214 442, 216 465"
          fill="none" stroke="#E07070" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="216" cy="468" r="4.5" fill="#E07070"/>
    <circle cx="216" cy="468" r="4.5" fill="none" stroke="#C85050" stroke-width="0.8"/>
  </g>

</svg>
</div>

<script>
  // ===== 眼睛鼠标跟随 =====
  const svg    = document.querySelector('svg');
  const pupilL = document.getElementById('pupilL');
  const pupilR = document.getElementById('pupilR');

  // 瞳孔中心（默认位置）
  const eyeL = { cx: 178, cy: 278 };
  const eyeR = { cx: 222, cy: 278 };
  const maxOffset = 5; // 最大偏移像素

  let targetX = 0, targetY = 0;
  let currentLx = eyeL.cx, currentLy = eyeL.cy;
  let currentRx = eyeR.cx, currentRy = eyeR.cy;

  // 鼠标移动 → 计算目标偏移
  document.addEventListener('mousemove', (e) => {
    const rect = svg.getBoundingClientRect();
    // 将鼠标坐标转为 SVG viewBox 坐标
    const svgX = (e.clientX - rect.left) / rect.width  * 400;
    const svgY = (e.clientY - rect.top)  / rect.height * 500;
    targetX = svgX;
    targetY = svgY;
  });

  // 平滑跟随动画循环
  function animateEyes() {
    // 左眼
    const dxL = targetX - eyeL.cx;
    const dyL = targetY - eyeL.cy;
    const distL = Math.sqrt(dxL * dxL + dyL * dyL) || 1;
    const offL = Math.min(maxOffset, distL * 0.02);
    const goalLx = eyeL.cx + (dxL / distL) * offL;
    const goalLy = eyeL.cy + (dyL / distL) * offL;
    currentLx += (goalLx - currentLx) * 0.08;
    currentLy += (goalLy - currentLy) * 0.08;
    pupilL.setAttribute('cx', currentLx.toFixed(2));
    pupilL.setAttribute('cy', currentLy.toFixed(2));

    // 右眼
    const dxR = targetX - eyeR.cx;
    const dyR = targetY - eyeR.cy;
    const distR = Math.sqrt(dxR * dxR + dyR * dyR) || 1;
    const offR = Math.min(maxOffset, distR * 0.02);
    const goalRx = eyeR.cx + (dxR / distR) * offR;
    const goalRy = eyeR.cy + (dyR / distR) * offR;
    currentRx += (goalRx - currentRx) * 0.08;
    currentRy += (goalRy - currentRy) * 0.08;
    pupilR.setAttribute('cx', currentRx.toFixed(2));
    pupilR.setAttribute('cy', currentRy.toFixed(2));

    requestAnimationFrame(animateEyes);
  }
  animateEyes();
</script>

</body>
</html>
